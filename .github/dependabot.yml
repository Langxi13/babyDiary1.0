version: 2
updates:
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      non-major-updates:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      non-major-updates:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      action-updates:
        patterns: ["*"]
