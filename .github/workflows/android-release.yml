name: Android internal release

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: Monotonically increasing Android version code
        required: true
        default: "1"
        type: string
      version_name:
        description: User-visible version, for example 1.0.0
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            frontend/android/**/*.gradle
            frontend/android/gradle/wrapper/gradle-wrapper.properties
      - run: npm ci --prefix frontend
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Prepare signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          : "${KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 is required}"
          : "${KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD is required}"
          : "${KEY_ALIAS:?ANDROID_KEY_ALIAS is required}"
          : "${KEY_PASSWORD:?ANDROID_KEY_PASSWORD is required}"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/baby-diary-upload.jks"
          keytool -list -keystore "$RUNNER_TEMP/baby-diary-upload.jks" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null
      - run: npm --prefix frontend run build
      - run: npx cap sync android
        working-directory: frontend
      - name: Build signed APK and AAB
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/baby-diary-upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code }}
          ANDROID_VERSION_NAME: ${{ inputs.version_name }}
        run: ./gradlew assembleRelease bundleRelease
      - name: Verify signed artifacts
        working-directory: frontend/android
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab >/dev/null
      - name: Upload signed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baby-diary-android-internal
          path: |
            frontend/android/app/build/outputs/apk/release/app-release.apk
            frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
