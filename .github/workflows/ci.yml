name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scripts:
    name: Script governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
      - run: scripts/verify-scripts.sh

  backend:
    name: Backend and MySQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - run: scripts/verify-backend.sh
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-jacoco
          path: backend/target/site/jacoco
          if-no-files-found: warn

  frontend:
    name: Frontend unit, coverage, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: scripts/verify-frontend.sh
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  e2e:
    name: Chromium, Firefox, and WebKit
    needs: [scripts, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npx playwright install --with-deps chromium firefox webkit
        working-directory: frontend
      - run: scripts/verify-e2e.sh
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn

  supply-chain:
    name: Dependencies and credentials
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Privacy and infrastructure disclosure scan
        run: |
          scripts/fetch-public-refs.sh
          scripts/privacy-scan.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm audit --prefix frontend --omit=dev --audit-level=high --registry=https://registry.npmjs.org
      - name: Trivy source and dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Gitleaks history scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Gitleaks all public refs
        run: >-
          docker run --rm -v "$PWD:/repo:ro"
          ghcr.io/gitleaks/gitleaks@sha256:cdbb7c955abce02001a9f6c9f602fb195b7fadc1e812065883f695d1eeaba854
          git /repo --log-opts=--all --redact --no-banner

  dast:
    name: Packaged staging and ZAP baseline
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create synthetic staging configuration
        run: |
          {
            echo 'DB_USERNAME=baby_diary_ci'
            echo "DB_PASSWORD=$(openssl rand -hex 24)"
            echo "MYSQL_ROOT_PASSWORD=$(openssl rand -hex 24)"
            echo "INVITATION_CODE=$(openssl rand -hex 18)"
            echo "JWT_SECRET=$(openssl rand -base64 48 | tr -d '\n')"
            echo "AI_CONFIG_ENCRYPTION_KEY=$(openssl rand -base64 48 | tr -d '\n')"
            echo 'PUBLIC_URL=http://127.0.0.1:4173'
            echo 'CORS_ALLOWED_ORIGINS=http://127.0.0.1:4173'
            echo 'STAGING_WEB_PORT=4173'
            echo 'STAGING_API_PORT=11002'
          } > .env.staging
      - run: STAGING_PROJECT_NAME=baby-diary-dast scripts/start-staging.sh
      - run: scripts/run-zap-baseline.sh
      - name: Capture staging logs
        if: always()
        run: mkdir -p artifacts && docker compose --env-file .env.staging -p baby-diary-dast -f compose.staging.yaml logs --no-color > artifacts/staging.log
      - name: Stop staging
        if: always()
        run: STAGING_PROJECT_NAME=baby-diary-dast scripts/stop-staging.sh
      - name: Upload DAST evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-and-staging
          path: artifacts
          if-no-files-found: warn
