server:
  port: 10002
  servlet:
    context-path: /

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.langxi.babydiary.entity

# 数据库配置
spring:
  cache:
    type: simple
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6380}
    timeout: 2s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/baby-diary?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:baby_diary}
    password: ${DB_PASSWORD}

  # 设置文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

diaryFilePath: ${DIARY_FILE_PATH:${user.dir}/data/images/}
diaryPageSize: 5
invitationCode: ${INVITATION_CODE}

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:2592000000}

# CORS配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app:
  cache:
    prefix: ${CACHE_PREFIX:baby-diary:local:}
  http:
    slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:1000}

ai:
  config:
    encryption-key: ${AI_CONFIG_ENCRYPTION_KEY}

# SpringDoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
