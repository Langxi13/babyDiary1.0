server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: 10002
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.langxi.babydiary.entity

spring:
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}
      timeout: 2s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 256MB
      max-request-size: 300MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

diaryFilePath: ${DIARY_FILE_PATH}
diaryPageSize: ${DIARY_PAGE_SIZE:5}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:2592000000}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  invitation:
    bootstrap-code: ${INVITATION_CODE:}
    encryption-key: ${INVITATION_CODE_ENCRYPTION_KEY}
  auth:
    refresh-days: ${AUTH_REFRESH_DAYS:30}
    secure-cookie: ${AUTH_SECURE_COOKIE:true}
    step-up-minutes: ${AUTH_STEP_UP_MINUTES:10}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:}
    public-url: ${PUBLIC_URL:}
  push:
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@example.com}
  storage:
    provider: ${OBJECT_STORAGE_PROVIDER:local}
    local-root: ${DIARY_OBJECT_PATH:${user.dir}/data/objects/}
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:baby-diary}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
  media:
    processing-enabled: ${MEDIA_PROCESSING_ENABLED:true}
    ffmpeg: ${FFMPEG_BIN:ffmpeg}
    ffprobe: ${FFPROBE_BIN:ffprobe}
    tesseract: ${TESSERACT_BIN:tesseract}
  reminders:
    delivery-delay-ms: ${REMINDER_DELIVERY_DELAY_MS:60000}
  export:
    pdf-font-path: ${PDF_FONT_PATH:/usr/share/fonts/truetype/unifont/unifont.ttf}
  cache:
    prefix: ${CACHE_PREFIX:baby-diary:prod:}
  http:
    slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:1000}

ai:
  config:
    encryption-key: ${AI_CONFIG_ENCRYPTION_KEY}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.langxi.babydiary: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
