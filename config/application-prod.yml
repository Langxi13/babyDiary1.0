server:
  port: 10002
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.langxi.babydiary.entity

spring:
  cache:
    type: redis
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6380}
    timeout: 2s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

diaryFilePath: ${DIARY_FILE_PATH}
diaryPageSize: ${DIARY_PAGE_SIZE:5}
invitationCode: ${INVITATION_CODE}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:2592000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  cache:
    prefix: ${CACHE_PREFIX:baby-diary:prod:}
  http:
    slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:1000}

ai:
  config:
    encryption-key: ${AI_CONFIG_ENCRYPTION_KEY}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.langxi.babydiary: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
