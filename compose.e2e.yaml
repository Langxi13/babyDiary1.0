services:
  mysql:
    image: mysql:8.4
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: baby-diary
      MYSQL_USER: baby_diary_e2e
      MYSQL_PASSWORD: baby_diary_e2e
      MYSQL_ROOT_PASSWORD: baby_diary_e2e_root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:3307:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pbaby_diary_e2e_root --silent"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  ai-mock:
    image: wiremock/wiremock:3.13.1
    command: ["--global-response-templating", "--disable-gzip"]
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./test-support/wiremock:/home/wiremock:ro

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:1026:1025"
      - "127.0.0.1:8026:8025"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: baby_diary_e2e
      MINIO_ROOT_PASSWORD: baby_diary_e2e_secret
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    profiles: ["s3"]
